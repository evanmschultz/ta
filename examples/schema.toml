# Base schema for `ta`. Copied to ~/.ta/schema.toml by `mage install` when
# the file does not already exist; edit freely after install — re-running
# `mage install` will not clobber your edits.
#
# Each top-level table is a **database**. Every db declares:
#   - paths    = [...]                  one or more mount paths (project-
#                                       relative or home-relative `~/...`).
#                                       Glob `*` is allowed for one segment
#                                       per entry. See PLAN §12.17.9.
#   - format   = "toml" | "md"          canonical on-disk format
#   - description = "..."               (optional, recommended)
#
# Record types live under [<db>.<type>] with `description` (required) and,
# for MD dbs, `heading = 1..6`. Fields live under [<db>.<type>.fields.<name>]
# with metadata (type, required, enum, description, default, format).
#
# Types: string, integer, float, boolean, datetime, array, table.
#
# Resolution: home `~/.ta/schema.toml` is the base layer. Every
# `.ta/schema.toml` found on the target file's ancestor chain (filesystem-
# root-to-file order) folds on top. Same-named dbs are wholly replaced;
# dbs unique to any level are additive. Paths must not overlap across dbs.

[plans]
paths = ["plans"]
format = "toml"
description = "A TOML db for tracking tasks and freeform notes."

[plans.task]
description = "A unit of work tracked in plans."

[plans.task.fields.id]
type = "string"
required = true
description = "Stable identifier, e.g. 'TASK-001'."

[plans.task.fields.status]
type = "string"
required = true
enum = ["todo", "doing", "blocked", "done"]
description = "Current state of the task."

[plans.task.fields.title]
type = "string"
required = true
description = "One-line summary."

[plans.task.fields.body]
type = "string"
format = "markdown"
description = "Freeform writeup. Markdown with code fences supported."

[plans.note]
description = "A freeform note — use for meeting notes, journal entries, scratch thinking."

[plans.note.fields.title]
type = "string"
required = true
description = "Short headline for the note."

[plans.note.fields.body]
type = "string"
required = true
format = "markdown"
description = "Body of the note. Markdown."

[plans.note.fields.tags]
type = "array"
description = "Optional tag list, each an unstructured string."
