# ============================================================================
# ta_schema — the meta-schema: a self-describing record of the schema
# language. Surfaced via `schema(action="get", scope="ta_schema")`. Each
# `kind` below (db, type, field) corresponds to one of the three addressable
# shapes `schema(action="create"|"update"|"delete")` accepts; its `data`
# payload must match the fields declared here.
#
# The meta-schema itself is stored as a single-instance TOML db at
# .ta/meta_schema.toml — conceptually. In practice the literal is embedded
# in the ta binary and never resolved from disk. See V2-PLAN §4.7, §3.3,
# and PLAN §12.17.9 (Phase 9.1 paths-shape model migration).
# ============================================================================

[ta_schema]
paths = ["ta_schema.toml"]
format = "toml"
description = "Meta-schema: the three kinds (db, type, field) an agent constructs via the `schema` tool, and the meta-schema rules enforced on `schema.toml` at load time. See V2-PLAN §4.1, §4.7, and PLAN §12.17.9."

# ----------------------------------------------------------------------------
# kind = "db" — the data shape of `schema(action="create"|"update", kind="db",
# name="<db>", data=...)`. `paths` is required (length 1+); `format` is
# required; `description` is recommended. Per PLAN §12.17.9 Phase 9.1 the old
# `file` / `directory` / `collection` selector keys are removed.
# ----------------------------------------------------------------------------
[ta_schema.db]
description = "A database. Mounted at one or more on-disk paths via the `paths` slice; each entry is project-relative or home-relative (`~/...`). Glob `*` is allowed for one segment per entry."

[ta_schema.db.fields.format]
type = "string"
required = true
enum = ["toml", "md"]
description = "Canonical on-disk format. Binds this db to one backend."

[ta_schema.db.fields.paths]
type = "array"
required = true
description = "Mount paths (length 1+). Each entry is project-relative or home-relative; glob `*` is allowed for one segment per entry. Examples: ['plans.toml'], ['workflow/*/db'], ['docs/'], ['~/.ta/projects/myproj/workflow/*/db']. Paths must not overlap with any other db's paths slice (PLAN §12.17.9)."

[ta_schema.db.fields.description]
type = "string"
format = "markdown"
description = "Human-readable description of the db. Surfaced through the `schema` tool; recommended but not required."

# ----------------------------------------------------------------------------
# kind = "type" — the data shape of `schema(action="create"|"update",
# kind="type", name="<db>.<type>", data=...)`. `description` required;
# `heading` required when the owning db has format = "md".
# ----------------------------------------------------------------------------
[ta_schema.type]
description = "A record type under a db. Corresponds to one [<db>.<type>] sub-table."

[ta_schema.type.fields.description]
type = "string"
required = true
format = "markdown"
description = "Human-readable description of the type. Surfaced through the `schema` tool."

[ta_schema.type.fields.heading]
type = "integer"
enum = [1, 2, 3, 4, 5, 6]
description = "MD-only: the ATX heading level (1..6) this type's records occupy. Required when the owning db has format = 'md'; must be absent when format = 'toml'. Each heading level must be unique within a given MD db."

# ----------------------------------------------------------------------------
# kind = "field" — the data shape of `schema(action="create"|"update",
# kind="field", name="<db>.<type>.<field>", data=...)`. `type` required;
# everything else optional.
# ----------------------------------------------------------------------------
[ta_schema.field]
description = "A field on a record type. Corresponds to one [<db>.<type>.fields.<name>] sub-table."

[ta_schema.field.fields.type]
type = "string"
required = true
enum = ["string", "integer", "float", "boolean", "datetime", "array", "table"]
description = "Declared field type. Matches TOML's native types."

[ta_schema.field.fields.required]
type = "boolean"
default = false
description = "Whether the field must be present in a valid record. Defaults to false."

[ta_schema.field.fields.description]
type = "string"
format = "markdown"
description = "Human-readable description of the field. Surfaced verbatim in validation failures."

[ta_schema.field.fields.enum]
type = "array"
description = "Optional allowed-value list. Values must match `type`."

[ta_schema.field.fields.default]
type = "string"
description = "Optional default value. Not applied during validation; informational only."

[ta_schema.field.fields.format]
type = "string"
description = "Optional format hint (e.g. 'markdown'). Informational; informs alternate renderers per V2-PLAN §13."
