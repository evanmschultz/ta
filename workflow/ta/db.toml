[build_task.task_12_1]
body = "Defined `internal/record/Backend` and moved `internal/tomlfile/` behind it as `internal/backend/toml/` per V2-PLAN §5.1 / §12.1. Commit `1e636d9` (followed by the Option A schema-rename chain `e689007`..`14b22d2`) preserved byte-identity of the moved files modulo the `package tomlfile` → `package toml` header and kept all MVP tests green with `-race`. Interface-only `internal/record` package has no tests at this slice; downstream consumption begins in §12.2."
id = "task_12_1"
owner = "evanmschultz"
status = "done"
title = "Backend interface extraction"

[build_task.task_12_2]
body = "Reshaped `.ta/schema.toml` from `[schema.<type>]` to db-scoped `[<db>.<type>]` and added the meta-schema validator per V2-PLAN §4.1 / §4.7 / §12.2. Commit `ca0b63e` landed the loader rewrite (shape exclusivity, format/extension check, MD heading rules, path uniqueness), the embedded meta-schema (`internal/schema/meta_schema.toml` + `//go:embed`), and the `ta_schema` scope short-circuit in `handleSchema`. Option A follow-up `95f1d48` closed the Lookup→LookupDB fallback regression that silently accepted dotted type typos."
id = "task_12_2"
owner = "evanmschultz"
status = "done"
title = "Schema language update"

[build_task.task_12_3]
body = "Shipped `internal/db/` with uniform `<db>.<type>.<id-path>` / `<db>.<instance>.<type>.<id-path>` address parsing, dir-per-instance + collection scans, prefix-glob, and `filepath.IsLocal` guard on `path_hint` per V2-PLAN §2.9 / §3.4 / §11.D. Combined with §12.4 per dev directive; final state at `693ff63` after three reworks (`7b8cb70` → `4dfd480` → `7d2f99d` → `693ff63`) and three spec companions (`8ba89b8`, `dea7bca`, `bd10688`). Strict orphan semantics landed via Option B: legacy orphans readable, new orphan-level writes require materializing the missing declared ancestor first."
id = "task_12_3"
owner = "evanmschultz"
status = "done"
title = "Address resolution package"

[build_task.task_12_4]
body = "Built `internal/backend/md/` as a schema-driven ATX scanner with hierarchical ancestor-chain addressing, same-or-shallower byte-range rule, nested `Splice` with `ErrParentMissing`, and malformed-address guard symmetric across `Emit` and `Splice` per V2-PLAN §5.3 / §2.10 / §2.11. Combined with §12.3 per dev directive; final state at `693ff63`. Coverage at `mage cover` time: 91.1% — above the ≥85% backend target from §10.4."
id = "task_12_4"
owner = "evanmschultz"
status = "done"
title = "MD backend"

[build_task.task_12_5]
body = "Hard-cut `upsert` and added `get(fields)`, `create(section, data, path_hint)`, `update(section, data)`, `delete(section)` on both MCP and CLI surfaces per V2-PLAN §3.1 / §3.4 / §3.5 / §3.6 / §12.5. Combined with §12.6; final state at `aa7f1a6` after `5f607ab` (combined build) and `e99ff94` (spec amendment adding `fields` to `kind=type` payloads). Option A follow-up in `aa7f1a6` closed three fail-loudly gaps: MD non-body field rejection, dir-per-instance rollback on write failure, and record-level delete file-not-found wrapping."
id = "task_12_5"
owner = "evanmschultz"
status = "done"
title = "Data tool surface"

[build_task.task_12_6]
body = "Extended the `schema` tool with `action={get, create, update, delete}` + atomic-rollback via `schema.LoadBytes` pre-write gate per V2-PLAN §3.3 / §4.5 / §4.7 / §12.6. Combined with §12.5 in commits `5f607ab` / `e99ff94` / `aa7f1a6`. Reserved-name guard on `ta_schema` closed the §12.2 Proof-routed unknown; mutations always target the project `.ta/schema.toml` write layer, never home."
id = "task_12_6"
owner = "evanmschultz"
status = "done"
title = "Schema tool CRUD"

[build_task.task_12_7]
body = "Added `internal/render/` consolidating every CLI surface behind a single `Renderer` (`Notice` / `Success` / `Error` / `List` / `Markdown` / `Record`); moved `humanPolicy` from `cmd/ta/main.go` to `HumanPolicy` in the render package per V2-PLAN §13 / §12.7. Combined with §12.8 in commits `a482cd0` / `85fe917`. §13.3 MCP firewall enforced by dependency direction: `internal/mcpsrv/` imports no `internal/render`."
id = "task_12_7"
owner = "evanmschultz"
status = "done"
title = "Laslig CLI rendering"

[build_task.task_12_8]
body = "Shipped `internal/search/` with `Query{Path, Scope, Match, Query, Field}` + `Result{Section, Bytes, Fields}`, regex via `regexp`, AND-ordering (Match first, Query second), cross-instance union per V2-PLAN §3.7 / §7 / §12.8. Combined with §12.7 in `a482cd0` / `85fe917`. Option A follow-up `85fe917` added shared `internal/backend/md/layout.go` `CheckBackableFields` helper so `mcpsrv/fields.go` and `internal/search/search.go` share one MD body-only rejection contract, plus `--verbose` on mutating CLI commands and unconstrained-scope unknown-field tightening."
id = "task_12_8"
owner = "evanmschultz"
status = "done"
title = "Search"

[build_task.task_12_9]
body = "In-progress: in-memory schema-cascade cache at `internal/mcpsrv/cache.go` keyed on project path with `os.Stat`-mtime + deletion invalidation; atomic swap on `MutateSchema` success; startup meta-validation via `Config.ProjectPath` pre-warm that refuses to boot on a malformed cascade. Implements V2-PLAN §4.6 + §12.9. Thread-safe RWMutex + double-checked locking; per-project entries are independent."
id = "task_12_9"
owner = "evanmschultz"
status = "doing"
title = "MCP caching"

[build_task.task_12_10]
body = "In-progress: this record is itself materialized by the `mage dogfood` target introduced in this slice, which routes through `mcpsrv.Create` to eat the §2.7 dogfood principle end-to-end. Writes `workflow/ta-v2/db.toml` carrying 8 done build_tasks + 16 QA twins + 2 in-flight build_tasks per V2-PLAN §12.10. Idempotent on re-run via existence check; orchestrator retains write ownership of `workflow/ta-v2/WORKLOG.md` which stays in place until §12.11 README collapse."
id = "task_12_10"
owner = "evanmschultz"
status = "doing"
title = "Dogfood migration"

